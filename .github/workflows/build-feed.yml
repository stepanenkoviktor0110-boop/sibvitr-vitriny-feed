name: Build feed

# Курированный фид витрин Сибвитрины для B24U.
# Источник — публичный WooCommerce Store API (хардкод в build-feed.mjs), секрет не нужен.
# feed.xml в git НЕ автокоммитим (Pages build_type=workflow раздаёт артефакт деплоя).
# Репозиторный public/feed.xml — seed/last-known-good для фолбэка при геоблоке RU-источника.
#
# Pages включить один раз:
#   gh api -X POST repos/<owner>/<repo>/pages -f build_type=workflow

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов — цены каталога свежие
  workflow_dispatch:
  push:
    branches: [main]
    paths: [build-feed.mjs, package.json, .github/workflows/build-feed.yml]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build feed
        run: npm run build
      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp public/feed.xml _site/feed.xml
          cp .nojekyll _site/.nojekyll 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
